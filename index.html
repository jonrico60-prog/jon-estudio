<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jon - Portal de Estudio</title>
<script>
  // Redirige al login (o al portal si ya hay usuario logueado)
  // Usamos replace() para no anadir entrada en el historial y evitar bucles
  (function() {
    var hayUsuario = localStorage.getItem('jon_current_user');
    var destino = hayUsuario ? 'app/portal.html' : 'app/index.html';
    window.location.replace(destino);
  })();
</script>
<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    text-align: center;
  }
  a { color: #fff; text-decoration: underline; }
</style>
</head>
<body>
  <div>
    <h1>Cargando portal de Jon...</h1>
    <p>Si no se redirige automáticamente, <a href="app/index.html">pulsa aquí para entrar</a>.</p>
  </div>
</body>
</html>
