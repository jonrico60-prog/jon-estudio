<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azterketa Orokorra - Gizarte</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #c0392b 0%, #8e44ad 100%);
    min-height: 100vh; padding: 20px;
  }
  .container { max-width: 750px; margin: 0 auto; }
  .header { text-align: center; color: white; padding: 20px 0; }
  .header h1 { font-size: 1.9em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
  .header p { opacity: 0.9; margin-top: 5px; font-size: 1.05em; }
  .header .warning {
    margin-top: 10px; padding: 8px 14px; background: rgba(255,255,255,0.15);
    border-radius: 8px; display: inline-block; font-size: 0.9em;
  }
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px; color: white;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: 0.95em;
    font-family: inherit; transition: all 0.2s; margin-bottom: 18px; text-decoration: none;
  }
  .btn-back:hover { background: rgba(255,255,255,0.3); }
  .question-card {
    background: white; border-radius: 16px; padding: 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px;
  }
  .question-card h3 { color: #2c3e50; font-size: 1.1em; margin-bottom: 14px; line-height: 1.5; }
  .question-num { color: #c0392b; font-size: 0.85em; font-weight: bold; margin-bottom: 8px; }
  .topic-tag {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.7em; font-weight: bold; margin-left: 8px; color: white;
    vertical-align: middle;
  }
  .tag-zirk { background: #e74c3c; }
  .tag-arnas { background: #3498db; }
  .tag-dig { background: #f39c12; }
  .tag-loko { background: #16a085; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
    cursor: pointer; transition: all 0.2s; font-size: 1em; font-family: inherit;
    background: white; text-align: left; color: #333;
  }
  .option:hover { border-color: #c0392b; background: #fdf2f0; }
  .option.selected { border-color: #c0392b; background: #fde7e3; font-weight: 600; }
  .option.correct { border-color: #27ae60; background: #d4edda; color: #155724; }
  .option.wrong { border-color: #e74c3c; background: #f8d7da; color: #721c24; }
  .option:disabled { cursor: default; }
  .feedback {
    margin-top: 10px; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; display: none;
  }
  .feedback.show-correct { background: #d4edda; color: #155724; display: block; }
  .feedback.show-wrong { background: #f8d7da; color: #721c24; display: block; }
  .btn-check {
    margin-top: 25px; margin-bottom: 20px; padding: 16px 40px; background: #c0392b; color: white;
    border: none; border-radius: 12px; font-size: 1.2em; cursor: pointer;
    font-family: inherit; transition: all 0.2s; display: block; width: 100%;
    font-weight: bold;
  }
  .btn-check:hover { background: #a93226; transform: translateY(-2px); }
  #result { display: none; text-align: center; }
  .result-card {
    background: white; border-radius: 16px; padding: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }
  .btn-retry {
    margin-top: 15px; padding: 12px 30px; background: #c0392b; color: white;
    border: none; border-radius: 10px; font-size: 1em; cursor: pointer;
    font-family: inherit; margin-right: 10px;
  }
  .btn-retry:hover { background: #a93226; }
  .btn-portal {
    margin-top: 15px; padding: 12px 30px; background: #3498db; color: white;
    border: none; border-radius: 10px; font-size: 1em; cursor: pointer;
    font-family: inherit; text-decoration: none; display: inline-block;
  }
  .btn-portal:hover { background: #2980b9; }
  .progress-bar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(0,0,0,0.3); border-radius: 10px;
    padding: 8px 15px; margin-bottom: 15px; color: white;
    backdrop-filter: blur(8px);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.9em;
  }
</style>
</head>
<body>
<div class="container">
  <a class="btn-back" href="../portal.html">&#8592; Atzera / Volver</a>
  <div class="header">
    <h1>&#128221; Azterketa Orokorra - Gizarte</h1>
    <p>4 aparatuak: Zirkulazioa, Arnasa, Digestio eta Lokomozio</p>
    <div class="warning">&#9888;&#65039; 25 galdera - Adi! Erantzun guztiak ondo pentsatu</div>
  </div>
  <div class="progress-bar">
    <span>&#128221; <strong id="answered-count">0</strong> / 25 erantzunda</span>
    <span>&#128338; Hartu zure denbora</span>
  </div>
  <div id="quiz-area"></div>
  <button class="btn-check" id="btn-check" onclick="checkAll()">&#9989; Bukatu eta egiaztatu / Terminar examen</button>
  <div id="result"><div class="result-card" id="result-card"></div></div>
</div>
<script src="../tracker.js"></script>
<script>
var questions = [
  // ZIRKULAZIO (6)
  { topic: 'zirk', q: "Zer da zirkulazio-aparatua?", opts: ["Janaria digeritzen duena", "Substantziak gorputzean zehar eramaten dituena", "Hezurrak mugitzen dituena", "Arnasa hartzen duena"], correct: 1 },
  { topic: 'zirk', q: "ARTERIAK: nondik nora eramaten dute odola?", opts: ["Organoetatik bihotzera", "Bihotzetik organoetara", "Bularraldetik buruko zatira", "Hesteetatik birikietara"], correct: 1 },
  { topic: 'zirk', q: "Zer dira KAPILARRAK?", opts: ["Bihotzaren barrunbeak", "Arterien eta zainen adarkadurarik meheenak", "Birikietako zaku txikiak", "Heste lodia osatzen dutenak"], correct: 1 },
  { topic: 'zirk', q: "Bihotzak ZABALDU egiten duenean...", opts: ["Odola kanpora irteten da", "Odola barrunbeetan sartzen da", "Bihotza gelditzen da", "Albeoloak zabaltzen dira"], correct: 1 },
  { topic: 'zirk', q: "Zenbat barrunbe ditu bihotzak?", opts: ["2", "3", "4", "5"], correct: 2 },
  { topic: 'zirk', q: "Odola nola itzultzen da bihotzera?", opts: ["Arterietatik zuzenean", "Bronkioen bidez", "Kapilarretatik eta zainetatik", "Tendoien bidez"], correct: 2 },

  // ARNAS (6)
  { topic: 'arnas', q: "Zer da arnas aparatua?", opts: ["Mugimendua ahalbidetzen duena", "Hezurrak osatzen dituena", "Oxigenoa hartu eta CO2 kanporatzen duena", "Janaria prozesatzen duena"], correct: 2 },
  { topic: 'arnas', q: "Zein da arnasbideen ordena ZUZENA?", opts: ["Sudurra, faringea, laringea, trakea, bronkioak, albeoloak", "Trakea, sudurra, bronkioak, albeoloak, faringea", "Albeoloak, bronkioak, trakea, laringea, sudurra", "Sudurra, trakea, faringea, bronkioak, laringea, albeoloak"], correct: 0 },
  { topic: 'arnas', q: "Zer dira ALBEOLOAK?", opts: ["Hodi lodiak bularraldean", "Bihotzaren barrunbeak", "Sudurraren atal bat", "Zaku ñimiñoak, odol-hodiz inguratuta"], correct: 3 },
  { topic: 'arnas', q: "Arnasgora gertatzen denean, zer egiten du diafragmak?", opts: ["Erlaxatzen da", "Uzkurtzen da", "Eztarrira igotzen da", "Birikiak ixten ditu"], correct: 1 },
  { topic: 'arnas', q: "Non gertatzen da gas-trukea?", opts: ["Trakean", "Bronkioetan", "Albeoloetan", "Faringean"], correct: 2 },
  { topic: 'arnas', q: "Zenbat etapa ditu arnas funtzionamenduak?", opts: ["Bi", "Hiru", "Lau", "Bost"], correct: 1 },

  // DIGESTIO (6)
  { topic: 'dig', q: "Zer da digestioa?", opts: ["Janariak gure gorputzean egiten duen bidaia", "Odolaren zirkulazioa", "Arnasaren prozesua", "Hezurren sorrera"], correct: 0 },
  { topic: 'dig', q: "Zein hodi pasatzen da ahotik urdailera?", opts: ["Trakea", "Bronkioa", "Hestegorria", "Heste meharra"], correct: 2 },
  { topic: 'dig', q: "Non xurgatzen dira mantenugaiak?", opts: ["Urdailan", "Heste meharrean", "Heste lodian", "Ahoan"], correct: 1 },
  { topic: 'dig', q: "Non xurgatzen dira ura eta gatz mineralak?", opts: ["Urdailan", "Heste meharrean", "Heste lodian", "Hestegorrian"], correct: 2 },
  { topic: 'dig', q: "Zein da digestio aparatuko ordena ZUZENA?", opts: ["Ahoa, urdaila, hestegorria, heste meharra, heste lodia", "Ahoa, hestegorria, urdaila, heste lodia, heste meharra", "Ahoa, hestegorria, urdaila, heste meharra, heste lodia", "Ahoa, urdaila, heste meharra, hestegorria, heste lodia"], correct: 2 },
  { topic: 'dig', q: "Aho fasean zer prozesu gertatzen dira?", opts: ["Soilik mekanikoa", "Soilik kimikoa", "Mekanikoa eta kimikoa", "Soilik xurgapenezkoa"], correct: 2 },

  // LOKOMOZIO (6)
  { topic: 'loko', q: "Zerk osatzen dute lokomozio aparatua?", opts: ["Soilik hezurrek", "Hezurrek, giharrek eta giltzadurek", "Soilik giharrek", "Birikek eta bihotzak"], correct: 1 },
  { topic: 'loko', q: "Zer dira giharrak?", opts: ["Organo zurrunak", "Hodi luzeak", "Organo elastikoak", "Likido bat"], correct: 2 },
  { topic: 'loko', q: "Zerk lotzen ditu giharrak hezurrei?", opts: ["Tendoiek", "Zainek", "Giltzadurek", "Bronkioek"], correct: 0 },
  { topic: 'loko', q: "Sorbaldatik ukondora dagoen hezur luzea zein da?", opts: ["Erradioa", "Humeroa", "Femurra", "Tibia"], correct: 1 },
  { topic: 'loko', q: "Izterreko hezur luzea zein da?", opts: ["Tibia", "Peronea", "Femurra", "Humeroa"], correct: 2 },
  { topic: 'loko', q: "Belaun-azpiko bi hezurrak zein dira?", opts: ["Humeroa eta erradioa", "Femurra eta pelbisa", "Tibia eta peronea", "Garezurra eta bizkarrezurra"], correct: 2 },

  // CROSS-CUTTING (1)
  { topic: 'mix', q: "Lau aparatu hauetatik, zein da mugimendua ahalbidetzen duena?", opts: ["Zirkulazio aparatua", "Arnas aparatua", "Digestio aparatua", "Lokomozio aparatua"], correct: 3 }
];

var TOPIC_LABELS = {
  zirk: { name: 'Zirkulazioa', cls: 'tag-zirk' },
  arnas: { name: 'Arnasa', cls: 'tag-arnas' },
  dig: { name: 'Digestioa', cls: 'tag-dig' },
  loko: { name: 'Lokomozioa', cls: 'tag-loko' },
  mix: { name: 'Orokorra', cls: 'tag-loko' }
};

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}
shuffle(questions);

questions.forEach(function(q) {
  var correctText = q.opts[q.correct];
  var opts = q.opts.slice();
  shuffle(opts);
  q.opts = opts;
  q.correct = opts.indexOf(correctText);
});

var selections = [];
for (var i = 0; i < questions.length; i++) selections.push(-1);

function updateProgress() {
  var c = 0;
  selections.forEach(function(s) { if (s !== -1) c++; });
  document.getElementById('answered-count').textContent = c;
}

function renderAll() {
  var html = '';
  questions.forEach(function(q, qi) {
    var t = TOPIC_LABELS[q.topic];
    html += '<div class="question-card" id="q' + qi + '">';
    html += '<div class="question-num">' + (qi + 1) + '. galdera <span class="topic-tag ' + t.cls + '">' + t.name + '</span></div>';
    html += '<h3>' + q.q + '</h3><div class="options">';
    q.opts.forEach(function(opt, oi) {
      html += '<button class="option" onclick="selectOpt(' + qi + ',' + oi + ',this)" data-q="' + qi + '" data-o="' + oi + '">' + opt + '</button>';
    });
    html += '</div><div class="feedback" id="fb' + qi + '"></div></div>';
  });
  document.getElementById('quiz-area').innerHTML = html;
}

function selectOpt(qi, oi, el) {
  var card = document.getElementById('q' + qi);
  card.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  selections[qi] = oi;
  updateProgress();
}

function checkAll() {
  var unanswered = [];
  questions.forEach(function(q, qi) {
    if (selections[qi] === -1) unanswered.push(qi + 1);
  });
  if (unanswered.length > 0) {
    if (!confirm('Erantzun gabe daude: ' + unanswered.join(', ') + '. Hala ere bukatu nahi duzu?')) return;
  }
  document.querySelectorAll('.option').forEach(function(o) { o.disabled = true; o.style.cursor = 'default'; });
  document.getElementById('btn-check').style.display = 'none';

  var score = 0;
  questions.forEach(function(q, qi) {
    var card = document.getElementById('q' + qi);
    var fb = document.getElementById('fb' + qi);
    card.querySelectorAll('.option').forEach(function(o) {
      var oi = parseInt(o.getAttribute('data-o'));
      if (oi === q.correct) o.classList.add('correct');
      if (oi === selections[qi] && oi !== q.correct) o.classList.add('wrong');
    });
    if (selections[qi] === q.correct) {
      score++;
      fb.className = 'feedback show-correct';
      fb.textContent = '✅ Ondo';
    } else {
      fb.className = 'feedback show-wrong';
      // SIN PISTAS: solo dice "Gaizki"
      fb.textContent = '❌ Gaizki';
    }
  });

  var res = showResultWithMedal(score, questions.length, 'result-card');
  saveResult('Gizarte - Azterketa Orokorra', score, questions.length, res.nota, res.pct);
  document.getElementById('result-card').innerHTML += '<div style="margin-top:20px"><button class="btn-retry" onclick="location.reload()">\u{1F504} Berriro saiatu</button><a class="btn-portal" href="../portal.html">\u{1F3E0} Portalera itzuli</a></div>';
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
}

renderAll();
</script>
</body>
</html>
